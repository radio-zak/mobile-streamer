name: Submit release to production

on:
  push:
    tags:
      - "v*"
      - "!**alpha*"
    paths-ignore:
      - CHANGELOG.md
      - LICENSE
      - README.md
      - cliff.toml
      - .gitignore
      - .github/**
      - .vscode/**

env:
  VERSION_NAME: ${{ github.ref_name }}

jobs:
  release-android:
    name: Release Android
    runs-on: ubuntu-latest
    env:
      RUBY_VERSION: "3.3.10"
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Setup Ruby
        uses: ruby/setup-ruby@v1
        with:
          ruby-version: ${{ env.RUBY_VERSION }}
          bundler-cache: true
          working-directory: "android"

      - name: Create service account json
        run: |
          echo -n "${{ secrets.FIREBASE_SERVICE_ACCOUNT }}" | base64 --decode > android/zak-streamer.secret.json

      - name: Push latest build from testing to production
        run: |
          bundle exec fastlane production
        working-directory: android

